# /etc/logrotate.d/frenzy
# System-level log rotation (alternative to built-in rotation).
# Use this ONLY if FRENZY_LOG_FILE is NOT set (i.e., logs go to journald or a plain file
# written by output redirection). If the built-in rotation is active, this is not needed.

/var/log/frenzy/frenzy.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 100M
}
